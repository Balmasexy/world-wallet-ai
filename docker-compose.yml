version: '3.8'

services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/world_wallet
    depends_on:
      - db

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      - db

  wallet:
    build:
      context: ./services/wallet
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    depends_on:
      - db
      - api

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    depends_on:
      - api

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=world_wallet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
